version: '3'

services:
  gobarber-api:
    build: .
    container_name: gobarber-api
    volumes:
      - .:/home/node/api
      - /home/node/api/node_modules
    ports:
      - '3333:3333'
    depends_on:
      - gobarber-redis
    networks:
      - gobarber-network
  gobarber-redis:
    image: redis:alpine
    container_name: gobarber-redis
    environment:
      - ALLOW_EMPTY_PASSWORD=no
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - gobarber-redis-data:/data
    networks:
      - gobarber-network

volumes:
  gobarber-redis-data:

networks:
  gobarber-network:
    driver: bridge
